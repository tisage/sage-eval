  gemini3:
    output_dir: results/gemini3
    layer4_cultural:
      primary_model: google/gemini-3-pro-preview
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536
    layer5_emotional:
      primary_model: google/gemini-3-pro-preview
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536
    layer6_existential:
      primary_model: google/gemini-3-pro-preview
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536

  # Mistral Medium 3.1 (French model - European cultural perspective)
  # Context: 128K tokens
  # Hypothesis: Better performance on European literature (French, Russian, German)
  # IMPORTANT: Uses response_format for enforced JSON output
  mistral:
    output_dir: results/mistral
    layer4_cultural:
      primary_model: mistralai/mistral-medium-3.1
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536
