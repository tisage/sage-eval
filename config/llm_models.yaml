      response_format:
        type: json_object
    layer6_existential:
      primary_model: mistralai/mistral-medium-3.1
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536
      response_format:
        type: json_object

  # DeepSeek V3.2 Exp (Chinese model - Asian cultural perspective)
  # Context: 128K tokens
  # Hypothesis: Better performance on Asian literature (Chinese, Japanese)
  deepseek:
    output_dir: results/deepseek
    layer4_cultural:
      primary_model: deepseek/deepseek-v3.2-exp
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536
    layer5_emotional:
      primary_model: deepseek/deepseek-v3.2-exp
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536
    layer6_existential:
      primary_model: deepseek/deepseek-v3.2-exp
      provider: openrouter
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.5
      max_tokens: 65536

  # Legacy flagship profile (mixed models)
  # GPT-5 context: 400K tokens, Max output: 128K tokens
  # Gemini 2.5 Pro context: 1M tokens, Max output: 65K tokens
  flagship:
    output_dir: results/flagship
    layer4_cultural:
      primary_model: gpt-5
      reasoning_effort: medium  # GPT-5 uses reasoning.effort instead of temperature
      max_tokens: 128000
    layer5_emotional:
      primary_model: gemini-2.5-pro
      thinking_budget: 8192     # Gemini uses thinkingBudget for reasoning control
      max_tokens: 65536
