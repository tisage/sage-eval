multi_round:
  enabled: true
  num_rounds: 5
  mode: content-limit
  independent_validation:
    enabled: true
models:
  iterative_evaluator: gpt-5-mini
  independent_validator: gpt-5-mini
test_modes:
- name: content-limit
  description: Evaluate based only on provided text content, no metadata
  mode: content-limit
- name: title-limit
  description: Evaluate based only on title and author, synthesize scholarly consensus
  mode: title-limit
output:
  save_conversation_history: true
  save_trajectories: true
  save_independent_validation: true
  results_dir: results/multi_round
dimensions:
- name: intersectional_power_dynamics
  abbreviation: IPD
  weight: 1.0
  reliability: to_be_determined
  description: Configuration, negotiation and legitimation of power across social
    axes (may include class, gender, race, kinship, occupation, age, religion, etc.)
  theory: Bourdieu's Field Theory + Marxist Criticism + Feminist Theory + Postcolonial
    Theory + Power Structure Analysis
  evidence_requirement: high
  pk_sensitivity: low
  focus: How power is distributed, negotiated, and legitimated through social structures
    and relationships
- name: cultural_voice_perspective
  abbreviation: CVP
  weight: 1.0
  reliability: to_be_determined
  description: Narrative positioning as insider with cultural authority vs. outsider
    gaze with potential exoticization
  theory: Postcolonial Theory (Said's Orientalism, Spivak's Subaltern Studies), Narrative
    Theory
  evidence_requirement: medium
  pk_sensitivity: medium
  focus: Epistemic stance and cultural authority of narrative voice
- name: cultural_specificity
  abbreviation: CSP
  weight: 1.0
  reliability: to_be_determined
  description: Density and precision of cultural particularities (time, place, social
    practices, material culture)
  theory: Thick Description (Geertz), Cultural Anthropology, Historical Particularism
  evidence_requirement: high
  pk_sensitivity: medium
  focus: Thickness of cultural description across temporal, spatial, social, material
    domains
- name: cultural_pattern_complexity
  abbreviation: CPC
  weight: 1.0
  reliability: to_be_determined
  description: 'Structural complexity of cultural patterns: relational systems, conflict
    structures, self-reflexivity, archetypal depth'
  theory: Structural Anthropology (Lévi-Strauss), Cultural Systems Theory, Postcolonial
    Reflexivity, Archetypal Theory
  evidence_requirement: high
  pk_sensitivity: low
  focus: Depth vs. simplification, archetype vs. cliché, structural tension vs. binary
    opposition
  sub_dimensions:
  - relational_complexity
  - conflict_structuration
  - cultural_self_reflexivity
  - pattern_archetypal_quality
confidence:
  high: 4
  medium: 3
  low: 2
validation:
  score_stability_threshold: 0.3
  confidence_increase_expected: true
  validator_agreement_threshold: 0.5
logging:
  level: INFO
  save_detailed_logs: true
  log_file: logs/multi_round_evaluation.log
test_stories:
