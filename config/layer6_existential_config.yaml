multi_round:
  enabled: true
  num_rounds: 5
  mode: content-limit
  independent_validation:
    enabled: true
models:
  iterative_evaluator: gpt-5-mini
  independent_validator: gpt-5-mini
test_modes:
- name: content-limit
  description: Evaluate based only on provided text content, no metadata
  mode: content-limit
- name: title-limit
  description: Evaluate based only on title and author, synthesize scholarly consensus
  mode: title-limit
output:
  save_conversation_history: true
  save_trajectories: true
  save_independent_validation: true
  results_dir: results/layer6_existential
dimensions:
- name: life_philosophy
  abbreviation: LP
  weight: 1.0
  reliability: to_be_determined
  description: Depth of reflection on life's meaning, purpose, and values
  theory: Existentialism (Heidegger, Sartre, Camus, Eastern Philosophy)
  evidence_requirement: medium
  pk_sensitivity: medium
  focus: Questions about meaning/purpose/value, sustained philosophical engagement,
    open-endedness
  projection_risk: high
- name: moral_reflection
  abbreviation: MR
  weight: 1.0
  reliability: to_be_determined
  description: Engagement with ethical dilemmas, moral choices, and questions of right
    and wrong
  theory: Moral Philosophy (Levinas, MacIntyre, Confucian Ethics)
  evidence_requirement: medium
  pk_sensitivity: low
  focus: Ethical dilemmas, moral complexity, competing goods, consequences
  projection_risk: medium
- name: human_condition
  abbreviation: HC
  weight: 1.0
  reliability: to_be_determined
  description: Insight into universal aspects of human existence (mortality, suffering,
    alienation, freedom)
  theory: Philosophical Anthropology (Arendt, Nussbaum)
  evidence_requirement: medium
  pk_sensitivity: low
  focus: Mortality/suffering/alienation/connection/freedom, universal themes in particular
    situations
  projection_risk: medium
- name: meaning_exploration
  abbreviation: ME
  weight: 1.0
  reliability: to_be_determined
  description: Pursuit of existential questions with open-ended inquiry
  theory: Hermeneutics (Ricoeur, Gadamer)
  evidence_requirement: medium
  pk_sensitivity: medium
  focus: Active existential questioning, open-endedness, inquiry vs answers
  projection_risk: high
confidence:
  high: 4
  medium: 3
  low: 2
validation:
  score_stability_threshold: 0.3
  confidence_increase_expected: true
  validator_agreement_threshold: 0.5
  convergence_target: 0.9
layer_boundary:
  layer4_check: Avoid evaluating cultural power structures (that's Layer 4)
  layer5_check: Avoid evaluating emotional depth or psychological interiority (that's
    Layer 5)
  layer2_check: Avoid evaluating plot structure quality (that's Layer 2)
  layer1_check: Avoid evaluating general vocabulary sophistication (that's Layer 1)
projection_bias:
  check_western_framework: Don't impose Western existentialist frameworks (Sartre,
    Camus) on non-Western texts
  check_explicit_philosophy: Don't equate explicit philosophical discourse with depth;
    implicit themes through action/structure are equally valid
  check_profundity_bias: Don't assume dark/tragic themes are more existentially profound
    than themes of joy or ordinary life
  check_framework_imposition: Don't measure texts against a specific philosophical
    tradition as the standard
logging:
  level: INFO
  save_detailed_logs: true
  log_file: logs/layer6_existential_evaluation.log
